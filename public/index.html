<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康資料紀錄</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Login Page -->
    <div id="login-page" class="page active">
        <div class="glass-card">
            <h1>系統登入</h1>
            <p class="subtitle">請輸入您的帳號與密碼</p>
            <form id="login-form">
                <div class="input-group">
                    <label for="login-username">使用者名稱</label>
                    <input type="text" id="login-username" required placeholder="輸入帳號">
                </div>
                <div class="input-group">
                    <label for="login-password">密碼</label>
                    <input type="password" id="login-password" required placeholder="輸入密碼">
                </div>
                <button type="submit" class="btn-primary">登入</button>
            </form>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" id="go-to-register" style="color: var(--primary); text-decoration: none; font-size: 14px;">還沒有帳號？點此註冊</a>
            </div>
        </div>
    </div>

    <!-- Register Page -->
    <div id="register-page" class="page">
        <div class="glass-card">
            <h1>註冊帳號</h1>
            <p class="subtitle">建立您的專屬健康紀錄帳號</p>
            <form id="register-form">
                <div class="input-group">
                    <label for="reg-username">使用者名稱</label>
                    <input type="text" id="reg-username" required placeholder="設定帳號名稱">
                </div>
                <div class="input-group">
                    <label for="reg-password">密碼設定</label>
                    <input type="password" id="reg-password" required placeholder="設定登入密碼">
                </div>
                <div class="input-group">
                    <label for="reg-gender">性別</label>
                    <select id="reg-gender" required style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.5); outline: none; font-size: 16px; font-family: inherit;">
                        <option value="男">男</option>
                        <option value="女">女</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">註冊</button>
            </form>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" id="go-to-login" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">已經有帳號？返回登入</a>
            </div>
        </div>
    </div>

    <!-- Input Form Page -->
    <div id="form-page" class="page">
        <div class="glass-card">
            <h1>健康資料紀錄</h1>
            <p class="subtitle">請輸入您的基本資料</p>
            <form id="health-form">
                <div class="input-group">
                    <label for="height">身高 (cm)</label>
                    <input type="number" id="height" required step="0.1" placeholder="例如: 170.5">
                </div>
                <div class="input-group">
                    <label for="weight">體重 (kg)</label>
                    <input type="number" id="weight" required step="0.1" placeholder="例如: 65.0">
                </div>
                <div class="input-group">
                    <label for="age">年齡</label>
                    <input type="number" id="age" required placeholder="例如: 25">
                </div>
                <button type="submit" class="btn-primary">儲存並查看記錄</button>
            </form>
            <button id="view-records-btn" class="btn-secondary mt-3">直接查看歷史記錄</button>
        </div>
    </div>

    <!-- Records List Page -->
    <div id="list-page" class="page">
        <div class="glass-card large">
            <h1>歷史紀錄列表</h1>
            <div style="display: flex; gap: 10px; margin-bottom: 24px;">
                <button id="back-btn" class="btn-secondary" style="margin-bottom: 0;">返回新增</button>
                <button id="export-excel-btn" class="btn-primary" style="margin-bottom: 0; background-color: #10b981;">下載 Excel</button>
            </div>
            
            <div class="table-container">
                <table id="records-table">
                    <thead>
                        <tr>
                            <th>紀錄時間</th>
                            <th>姓名</th>
                            <th>身高 (cm)</th>
                            <th>體重 (kg)</th>
                            <th>年齡</th>
                            <th>BMI</th>
                        </tr>
                    </thead>
                    <tbody id="records-body">
                        <!-- Records will be injected here -->
                    </tbody>
                </table>
                <div id="loading-indicator" class="loading hidden">載入中...</div>
                <div id="empty-state" class="empty-state hidden">目前還沒有任何紀錄喔！</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
